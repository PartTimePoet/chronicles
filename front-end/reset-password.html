<!DOCTYPE html>
<html lang="en">
<head>


<meta charset="UTF-8">
<title>Reset Password</title>


<style>


body{
font-family:Roboto;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}


.card{
background:white;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
}


input{
width:100%;
padding:10px;
margin-top:15px;
}


button{
width:100%;
padding:10px;
margin-top:20px;
cursor:pointer;
}


</style>


</head>


<body>


<div class="card">


<h2>Create New Password</h2>


<input type="password" id="password" placeholder="New password">


<button onclick="resetPassword()">
Reset Password
</button>


<p id="message"></p>


</div>


<script src="reset-password.js"></script>


</body>
</html>
