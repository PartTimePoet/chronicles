<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chronicles – Sign Up</title>
  <link rel="stylesheet" href="signupstyle.css" />
</head>


<body>
  <!-- Header -->
  <header>
    <div class="brand">
      <img src="assets/logo.png" alt="Chronicles Logo" />
    </div>
    <button type="button" class="back-btn"
        onclick="window.location.href='index.html'">
      Go Back
    </button>
  </header>


  <!-- FORM START -->
  <form id="signupForm">


    <main class="container">


      <section class="left">
        <h1>
          Create Your Account
          <img src="assets/flower.png" class="flower" alt="flower" />
        </h1>


        <label>Full Name</label>
        <input type="text" id="fullName" name="fullName" required />


        <label>Email Address</label>
        <input type="email" id="email" name="email" required />


        <label>Repeat Your Email Address</label>
        <input type="email" id="repeatEmail" required />


        <label>Username</label>
        <input type="text" id="username" name="username" required />
      </section>


      <section class="right">
        <label>Create Password</label>
        <input type="password" id="password" name="password" required />


        <label>Repeat Password</label>
        <input type="password" id="repeatPassword" required />
      </section>


    </main>


    <!-- Footer -->
    <footer>
      <p class="login-link">
        <a href="login.html">already have an account?</a>
      </p>


      <!-- Changed to submit -->
      <button type="submit" class="create-btn">
        CREATE
      </button>
    </footer>


  </form>
  <!-- FORM END -->


  <script src="signupscript.js"></script>
  <div class="footer-bg"></div>
</body>
</html>
